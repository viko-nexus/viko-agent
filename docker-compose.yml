name: viko

services:

  # ── 9router — LLM gateway with fallback routing ─────────────────────────────
  # Provider API keys (Anthropic, Groq) are configured via dashboard, not env vars.
  # Dashboard: http://localhost:20128/dashboard
  # Start with: docker compose --profile gateway up -d
  9router:
    container_name: viko-9router
    image: decolua/9router:latest
    profiles: [gateway, full]
    ports:
      # Bind to VIKO_BIND_ADDR (default loopback). Set to the Tailscale IP in .env
      # to reach the 9router dashboard over Tailscale without exposing it publicly.
      - "${VIKO_BIND_ADDR:-127.0.0.1}:20128:20128"
    volumes:
      - ./data/9router:/app/data
    environment:
      DATA_DIR: /app/data
      PORT: "20128"
      NODE_ENV: production
      BASE_URL: http://localhost:20128
      JWT_SECRET: ${NINEROUTER_JWT_SECRET}
      INITIAL_PASSWORD: ${NINEROUTER_INITIAL_PASSWORD}
      API_KEY_SECRET: ${NINEROUTER_API_KEY_SECRET}
      # No-op on Node.js; set for env-var parity with the hermes service.
      MALLOC_ARENA_MAX: "2"
    restart: unless-stopped
    mem_limit: 512m
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:20128/',r=>process.exit(r.statusCode<500?0:1)).on('error',()=>process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── 9router init — creates combos after fresh install or data wipe ───────────
  # Runs once per `docker compose up`, exits immediately after.
  # Safe to re-run — idempotent. Waits for 9router to be healthy first.
  9router-init:
    container_name: viko-9router-init
    image: python:3.11-slim
    profiles: [gateway, full]
    depends_on:
      9router:
        condition: service_healthy
    volumes:
      - ./data/9router:/app/data
      - ./scripts:/scripts
    command: python3 /scripts/init-9router.py /app/data/db/data.sqlite
    restart: "no"

  # ── Hermes (admin/primary) — AI orchestrator, WhatsApp bridge owner ─────────
  # Handles personal DMs, unregistered groups, and project onboarding.
  # Bridge binds on 0.0.0.0 so per-project Hermes containers can relay through it.
  # Built from Dockerfile.hermes (no official image).
  # Run: docker compose build hermes
  # Then: docker compose --profile full up -d
  hermes:
    container_name: viko-hermes
    build:
      context: .
      dockerfile: Dockerfile.hermes
      args:
        # Default to 1000:1000 (Linux VPS first-user convention) so a fresh
        # deploy matches provision-env.sh / .env.example. Hosts that differ
        # (e.g. macOS local dev, 501:20) set HERMES_UID/GID in .env, which wins.
        HERMES_UID: ${HERMES_UID:-1000}
        HERMES_GID: ${HERMES_GID:-1000}
    profiles: [full]
    depends_on:
      9router:
        condition: service_healthy
    volumes:
      # HERMES_HOME inside container is /opt/data (set in Dockerfile)
      - ./data/hermes:/opt/data
      # Mount projects root at the same path so Viko uses identical paths to host
      - ${VIKO_PROJECTS_ROOT}:${VIKO_PROJECTS_ROOT}:rw
      # Dedicated Viko SSH key (id_viko) — separate from personal keys.
      # Config specifies viko-exec user + StrictHostKeyChecking yes for all prod hosts.
      # Mounted to both SSH lookup locations inside the container.
      - ${HOME}/.viko/ssh:/opt/data/.ssh:ro
      - ${HOME}/.viko/ssh:/opt/data/home/.ssh:ro
      # Hooks from repo mounted into HERMES_HOME so Hermes loads them on startup
      - ./hooks:/opt/data/hooks:ro
      # MCP servers from repo — mounted read-only, registered in config.yaml
      - ./mcp-servers:/opt/viko/mcp-servers:ro
      # SOUL.md — bind-mounted directly so repo updates apply without cont-init path dependency
      - ./admin/SOUL.md:/opt/data/SOUL.md:ro
      # Skills: shared + admin-specific (onboarding skill)
      - ./skills:/opt/viko/skills:ro
      - ./admin/skills:/opt/viko/admin/skills:ro
      # Bridge routing config — written by hermes-admin, hot-reloaded by bridge
      - ./data/bridge:/opt/data/bridge:rw
      # Docker socket — REQUIRED for spawn-hermes.py to `docker run` the per-project
      # viko-{slug} containers (docker-out-of-docker). Grants this container
      # root-equivalent control of the host Docker daemon; hermes is the trusted
      # orchestrator by design. The project containers it spawns get NO socket.
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      # Bind to VIKO_BIND_ADDR (default loopback). Set to the Tailscale IP in .env
      # to reach the Hermes dashboard over Tailscale without exposing it publicly.
      - "${VIKO_BIND_ADDR:-127.0.0.1}:9119:9119"
    environment:
      # Remap container's hermes user to host user so bind-mount files are owned correctly.
      # Default 1000:1000 (Linux VPS first-user); host .env overrides for other platforms.
      HERMES_UID: ${HERMES_UID:-1000}
      HERMES_GID: ${HERMES_GID:-1000}
      # 9router connection — populate OPENAI_API_KEY from 9router dashboard after setup
      OPENAI_BASE_URL: http://viko-9router:20128/v1
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      # WhatsApp home channel — Viko sends startup notifications here (set in .env)
      WHATSAPP_HOME_CHANNEL: ${WHATSAPP_HOME_CHANNEL}
      # Owner display name — bridge stamps it as sender= on owner messages so Viko
      # addresses the owner by their real name instead of guessing.
      VIKO_OWNER_NAME: ${VIKO_OWNER_NAME:-}
      # Allow group messages (self-chat mode default blocks all groups)
      WHATSAPP_SELF_CHAT_ALLOW_GROUPS: "true"
      # Hermes >=v2026.7.7.2 defaults both policies to "pairing"; for groups that
      # has no handshake and hard-blocks all messages (gateway/platforms/
      # whatsapp_common.py _is_group_allowed returns False). Without this, the
      # WHATSAPP_HOME_CHANNEL group (and any group DM to the admin) goes silent.
      WHATSAPP_GROUP_POLICY: open
      WHATSAPP_DM_POLICY: open
      # 9Router media API (image gen, TTS, STT) — same URL and key as OPENAI_*
      NINEROUTER_URL: http://viko-9router:20128
      NINEROUTER_KEY: ${OPENAI_API_KEY}
      # Projects root — same absolute path as host (bind-mounted at identical path)
      # Used by Viko to locate app code and write project context files
      VIKO_PROJECTS_ROOT: ${VIKO_PROJECTS_ROOT}
      # Fix: macOS Docker Desktop VirtioFS throws EIO when Python reads system CA certs.
      # Use certifi bundle (inside image layers, not VirtioFS) to bypass the issue.
      SSL_CERT_FILE: /opt/hermes/.venv/lib/python3.13/site-packages/certifi/cacert.pem
      REQUESTS_CA_BUNDLE: /opt/hermes/.venv/lib/python3.13/site-packages/certifi/cacert.pem
      # Routing table path — explicit so the bridge doesn't fall back to its
      # $HOME-relative default ($HOME=/root in-container ≠ /home/viko). The file
      # is bind-mounted at /opt/data/bridge below. Without this, routingEntries=0
      # and every group message falls through to admin instead of the per-project
      # container — the actual cause of the cross-project "leak".
      ROUTING_FILE: /opt/data/bridge/routing.json
      # Bridge binds on all interfaces so per-project Hermes containers can reach it
      BRIDGE_BIND: "0.0.0.0"
      # Hostname used by relay clients as the Host header when connecting over Docker network
      BRIDGE_EXTRA_HOSTS: "viko-hermes"
      # GitHub token for automated deploy key setup during project onboarding
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      # Disable the busy-ack ("Sebentar ya, lagi saya kerjain…"). config.yaml's
      # display.busy_ack_enabled only takes effect via a reload path, not normal
      # boot, so the env var (read by gateway run.py) is the reliable switch.
      HERMES_GATEWAY_BUSY_ACK_ENABLED: "false"
      # Holographic memory — pure local SQLite, no API key needed
      # Dashboard (runs as s6 service alongside gateway)
      HERMES_DASHBOARD: "true"
      # A2: auth REQUIRED (not insecure). The dashboard binds 0.0.0.0 (needed for the
      # host port-map), which also exposes :9119 to every container on the shared docker
      # network — so the host bind is NOT a sufficient boundary. basic_auth gates it so a
      # project container can't scrape the session token / API key. Creds come from .env.
      HERMES_DASHBOARD_INSECURE: "false"
      HERMES_DASHBOARD_BASIC_AUTH_USERNAME: ${HERMES_DASHBOARD_BASIC_AUTH_USERNAME:-}
      # _PASSWORD (plaintext, convenient for local dev) OR _PASSWORD_HASH (scrypt, no
      # plaintext at rest — preferred in prod). The auth plugin uses the hash when set.
      HERMES_DASHBOARD_BASIC_AUTH_PASSWORD: ${HERMES_DASHBOARD_BASIC_AUTH_PASSWORD:-}
      HERMES_DASHBOARD_BASIC_AUTH_PASSWORD_HASH: ${HERMES_DASHBOARD_BASIC_AUTH_PASSWORD_HASH:-}
      HERMES_DASHBOARD_BASIC_AUTH_SECRET: ${HERMES_DASHBOARD_BASIC_AUTH_SECRET:-}
      HERMES_DASHBOARD_HOST: "0.0.0.0"
      HERMES_DASHBOARD_PORT: "9119"
      # Python glibc malloc arena tuning — reduces memory fragmentation by
      # capping arena count. 20–40% RAM reduction with zero functional impact.
      MALLOC_ARENA_MAX: "2"
    command: ["gateway", "run"]
    restart: unless-stopped
    mem_limit: 1536m
    # Cap docker json log growth so bridge/gateway output doesn't fill the disk.
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/127.0.0.1/9119'"]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 60s

# ── Option B: per-project Hermes instances ──────────────────────────────────
# Project Hermes containers are spawned dynamically by spawn-hermes.py
# and are NOT defined in this file. Each uses WHATSAPP_RELAY_MODE=true
# to proxy through the admin bridge above.
# To spawn: ssh viko-vps python3 ~/viko-agent/scripts/spawn-hermes.py <slug> <jid>
# Routing: data/bridge/routing.json (hot-reloaded by bridge, no restart needed)
