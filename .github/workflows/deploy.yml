name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

# Only one deploy runs at a time — cancel older in-progress runs on new push
concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  # ── Job 1: Build image on runner + push to GHCR ──────────────────────────────
  build:
    runs-on: ubuntu-latest
    outputs:
      rebuilt: ${{ steps.changed.outputs.result }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so we can diff exactly this push's range

      - name: Check if image rebuild needed
        id: changed
        run: |
          # Rebuild ONLY when THIS push touched Dockerfile.hermes or patches/.
          # (Old bug: `git log -10` re-triggered an 8GB rebuild+pull for unrelated
          #  pushes because old patches/ commits stayed inside the 10-commit window.)
          BEFORE='${{ github.event.before }}'
          SHA='${{ github.sha }}'
          if [ -z "$BEFORE" ] || [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
            CHANGED=$(git show --name-only --pretty=format: "$SHA")   # manual dispatch / first push
          else
            CHANGED=$(git diff --name-only "$BEFORE" "$SHA")
          fi
          echo "Changed files in this push:"; echo "$CHANGED"
          if echo "$CHANGED" | grep -qE '^(Dockerfile\.hermes|patches/)'; then
            echo "result=true" >> $GITHUB_OUTPUT
          else
            echo "result=false" >> $GITHUB_OUTPUT
          fi

      - name: Set up Buildx
        # Registry layer cache (cache-to type=registry) requires the
        # docker-container driver — the default docker driver can't export cache.
        if: steps.changed.outputs.result == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: steps.changed.outputs.result == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push to GHCR
        if: steps.changed.outputs.result == 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.hermes
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/viko-hermes:latest
          # Registry layer cache: rebuilt images keep unchanged layer digests, so the
          # VPS pull only fetches changed layers (not the full ~8GB) on legit rebuilds.
          cache-from: type=registry,ref=ghcr.io/${{ github.repository_owner }}/viko-hermes:buildcache
          cache-to: type=registry,ref=ghcr.io/${{ github.repository_owner }}/viko-hermes:buildcache,mode=max
          # UID/GID 1000 = viko user on trahku. Other VPSes: container auto-chowns at first start.
          build-args: |
            HERMES_UID=1000
            HERMES_GID=1000

  # ── Job 2: Deploy to VPS — pull image + restart ───────────────────────────────
  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to trahku
        uses: appleboy/ssh-action@v1
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_ACTOR: ${{ github.actor }}
          REBUILT: ${{ needs.build.outputs.rebuilt }}
          # Portable .env values — provisioned onto the VPS by scripts/provision-env.sh
          NINEROUTER_JWT_SECRET: ${{ secrets.NINEROUTER_JWT_SECRET }}
          NINEROUTER_INITIAL_PASSWORD: ${{ secrets.NINEROUTER_INITIAL_PASSWORD }}
          NINEROUTER_API_KEY_SECRET: ${{ secrets.NINEROUTER_API_KEY_SECRET }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          WHATSAPP_HOME_CHANNEL: ${{ secrets.WHATSAPP_HOME_CHANNEL }}
          VIKO_SSH_PUB: ${{ secrets.VIKO_SSH_PUB }}
          VIKO_ISOLATION_GUARD: ${{ secrets.VIKO_ISOLATION_GUARD }}
          VIKO_GITHUB_TOKEN: ${{ secrets.VIKO_GITHUB_TOKEN }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: GHCR_TOKEN,GHCR_ACTOR,REBUILT,NINEROUTER_JWT_SECRET,NINEROUTER_INITIAL_PASSWORD,NINEROUTER_API_KEY_SECRET,ANTHROPIC_API_KEY,GROQ_API_KEY,OPENAI_API_KEY,WHATSAPP_HOME_CHANNEL,VIKO_SSH_PUB,VIKO_ISOLATION_GUARD,VIKO_GITHUB_TOKEN
          command_timeout: 25m
          script: |
            set -e
            cd ~/projects/viko-agent

            # Always mirror repo exactly — discard any local edits on VPS
            git fetch origin main
            git reset --hard origin/main

            # Provision .env from GitHub secrets (portable keys upserted; host-specific
            # keys defaulted only if missing). GitHub secrets are the source of truth.
            bash scripts/provision-env.sh

            # Pull from GHCR FIRST (admin stays up during the pull) — only when the
            # image was rebuilt this run. A slow/failed pull must not take admin down,
            # so we do NOT remove the running container before the pull completes.
            if [ "$REBUILT" = "true" ]; then
              echo "Pulling latest image from GHCR..."
              echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_ACTOR" --password-stdin
              docker pull ghcr.io/eksant/viko-hermes:latest
              docker tag ghcr.io/eksant/viko-hermes:latest viko-hermes:latest
              docker logout ghcr.io
            fi

            # Recreate admin ONLY when the image was rebuilt; otherwise let compose
            # recreate it only if compose/.env config actually changed. This avoids a
            # needless ~30s WhatsApp blip on scripts-only deploys.
            if [ "$REBUILT" = "true" ]; then
              docker rm -f viko-hermes 2>/dev/null || true
              docker compose --profile full up -d --force-recreate hermes
            else
              docker compose --profile full up -d hermes
            fi
            docker ps --filter name=viko --format 'table {{.Names}}\t{{.Status}}'
