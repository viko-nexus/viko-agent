name: CI/CD

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write       # semantic-release: create tags + releases
  packages: write       # push versioned Docker image to GHCR
  issues: write         # semantic-release: comment on referenced issues
  pull-requests: write  # semantic-release: comment on merged PRs

# Only one deploy runs at a time — cancel older in-progress runs on new push
concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  # ── Job 1: Code quality checks ────────────────────────────────────────────────
  quality:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install ruff
        run: pip install ruff

      - name: Lint Python (scripts, patches, mcp-servers)
        run: ruff check scripts/ patches/ mcp-servers/

      - name: Check JavaScript (bridge)
        run: |
          for f in bridge/whatsapp-bridge.js bridge/allowlist.js; do
            [ -f "$f" ] && node --check "$f" && echo "OK: $f"
          done

  # ── Job 2: Build image on runner + push to GHCR ──────────────────────────────
  build:
    runs-on: ubuntu-latest
    needs: quality
    outputs:
      rebuilt: ${{ steps.changed.outputs.result }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so we can diff exactly this push's range

      - name: Check if image rebuild needed
        id: changed
        run: |
          # Rebuild ONLY when THIS push touched Dockerfile.hermes or patches/.
          # Avoids re-pulling a large image for unrelated pushes (docs, config, scripts).
          BEFORE='${{ github.event.before }}'
          SHA='${{ github.sha }}'
          if [ -z "$BEFORE" ] || [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
            CHANGED=$(git show --name-only --pretty=format: "$SHA")
          else
            CHANGED=$(git diff --name-only "$BEFORE" "$SHA")
          fi
          echo "Changed files in this push:"; echo "$CHANGED"
          if echo "$CHANGED" | grep -qE '^(Dockerfile\.hermes|patches/|bridge/)'; then
            echo "result=true" >> $GITHUB_OUTPUT
          else
            echo "result=false" >> $GITHUB_OUTPUT
          fi

      - name: Set up Buildx
        # Registry layer cache (cache-to type=registry) requires docker-container driver.
        if: steps.changed.outputs.result == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: steps.changed.outputs.result == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push to GHCR
        if: steps.changed.outputs.result == 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.hermes
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/viko-agent:latest
          # Registry layer cache: unchanged layers are not re-pulled on the VPS.
          cache-from: type=registry,ref=ghcr.io/${{ github.repository_owner }}/viko-agent:buildcache
          cache-to: type=registry,ref=ghcr.io/${{ github.repository_owner }}/viko-agent:buildcache,mode=max
          # HERMES_UID/GID: deploy user on the VPS (UID 1000). Container auto-chowns at first start.
          build-args: |
            HERMES_UID=1000
            HERMES_GID=1000

  # ── Job 3: Deploy to VPS — runs directly on the VPS self-hosted runner ──────────
  # Runner registered at ~/actions-runner on VPS (label: self-hosted,linux,vps).
  # No SSH needed — runner executes docker commands locally on the VPS itself.
  deploy:
    runs-on: [self-hosted, linux, vps]
    needs: build

    env:
      REBUILT: ${{ needs.build.outputs.rebuilt }}
      GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GHCR_ACTOR: ${{ github.actor }}
      REPO_OWNER: ${{ github.repository_owner }}
      NINEROUTER_JWT_SECRET: ${{ secrets.NINEROUTER_JWT_SECRET }}
      NINEROUTER_INITIAL_PASSWORD: ${{ secrets.NINEROUTER_INITIAL_PASSWORD }}
      NINEROUTER_API_KEY_SECRET: ${{ secrets.NINEROUTER_API_KEY_SECRET }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      WHATSAPP_HOME_CHANNEL: ${{ secrets.WHATSAPP_HOME_CHANNEL }}
      WHATSAPP_OWNER_NUMBER: ${{ secrets.WHATSAPP_OWNER_NUMBER }}
      VIKO_SSH_PUB: ${{ secrets.VIKO_SSH_PUB }}
      VIKO_ISOLATION_GUARD: ${{ secrets.VIKO_ISOLATION_GUARD }}
      VIKO_GITHUB_TOKEN: ${{ secrets.VIKO_GITHUB_TOKEN }}

    defaults:
      run:
        working-directory: /home/deploy/viko-agent

    steps:
      - name: Sync repo
        run: |
          git fetch origin main
          git reset --hard origin/main

      - name: Provision .env
        run: bash scripts/provision-env.sh

      - name: Pull image from GHCR
        if: env.REBUILT == 'true'
        run: |
          echo "${GHCR_TOKEN}" | docker login ghcr.io -u "${GHCR_ACTOR}" --password-stdin
          docker pull ghcr.io/${REPO_OWNER}/viko-agent:latest
          docker tag ghcr.io/${REPO_OWNER}/viko-agent:latest viko-hermes:latest
          docker logout ghcr.io

      - name: Restart Hermes
        run: |
          if [ "${REBUILT}" = "true" ]; then
            docker rm -f viko-hermes 2>/dev/null || true
            docker compose --profile full up -d --force-recreate hermes
          else
            docker compose --profile full up -d hermes
          fi
          docker ps --filter name=viko --format 'table {{.Names}}\t{{.Status}}'

  # ── Job 4: Tag + GitHub release (conventional commits → semver) ──────────────
  release:
    runs-on: ubuntu-latest
    needs: deploy

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history required by semantic-release

      - name: Semantic Release
        id: release
        uses: cycjimmy/semantic-release-action@v4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Re-tag the already-pushed :latest — no rebuild needed.
      - name: Tag Docker image with version
        if: steps.release.outputs.new_release_published == 'true'
        run: |
          VERSION="v${{ steps.release.outputs.new_release_version }}"
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.repository_owner }}" --password-stdin
          docker pull ghcr.io/${{ github.repository_owner }}/viko-agent:latest
          docker tag  ghcr.io/${{ github.repository_owner }}/viko-agent:latest \
                      ghcr.io/${{ github.repository_owner }}/viko-agent:${VERSION}
          docker push ghcr.io/${{ github.repository_owner }}/viko-agent:${VERSION}
          docker logout ghcr.io
          echo "Published ghcr.io/${{ github.repository_owner }}/viko-agent:${VERSION}"
